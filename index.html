<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Güncellemesi</title>
    <style>
        body { background: #000; font-family: -apple-system, system-ui; margin: 0; }
        
        /* Gerçekçi iOS Alert Kutusu */
        .ios-alert {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 270px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .alert-title { font-weight: 600; padding: 20px 15px 5px; font-size: 17px; }
        .alert-desc { padding: 0 15px 20px; font-size: 13px; border-bottom: 0.5px solid #ccc; }
        .alert-btn { 
            color: #007aff; font-size: 17px; padding: 12px; 
            cursor: pointer; font-weight: 600; text-decoration: none; display: block;
        }
    </style>
</head>
<body>

<div id="alertBox" class="ios-alert">
    <div class="alert-title">Sistem Hatası (0x442)</div>
    <div class="alert-desc">Cihaz sahibi yüksek düzeyde 'gaylık' içeriyor. Lütfen en yakın Apple Store'a gidip itiraf edin.</div>
    <div class="alert-btn" onclick="trollCheck()">TAMAM</div>
</div>

<script>
    // Kullanıcı ekrana dokunduğu an müzik başlar (Apple Music) 
    // ve arkasından sahte hata penceresi çıkar
    document.body.addEventListener('click', function() {
        // Buraya istersen o music:// linkini ekleyebiliriz arkada çalsın diye
        document.getElementById('alertBox').style.display = 'block';
    });

    function trollCheck() {
        alert("Kaçış yok aga!"); // Sonsuz döngüye bile sokabiliriz :)
    }
</script>

</body>
</html>
